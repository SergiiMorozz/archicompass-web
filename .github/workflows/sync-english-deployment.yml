name: Sync English deployment branch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync-english:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the production source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror main to the English deployment branch
        run: git push origin HEAD:english --force
